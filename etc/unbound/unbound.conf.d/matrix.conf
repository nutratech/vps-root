server:
    # --- Performance & Caching ---
    # Matrix federation creates bursts of concurrent SRV and A/AAAA lookups.
    # Prefetching keeps frequently federated homeservers hot in the cache
    # by querying upstream before the TTL expires.
    prefetch: yes
    prefetch-key: yes

    # Allocate memory.
    # Rule of thumb: rrset-cache-size should be roughly 2x msg-cache-size.
    msg-cache-size: 50m
    rrset-cache-size: 100m

    # Set to the number of physical CPU cores available to the resolver.
    num-threads: 2

    # TCP/UDP optimization for handling high query throughput.
    so-reuseport: yes
    edns-buffer-size: 1232 # Recommended size to prevent UDP fragmentation with DNSSEC

    # TTL bounds. Prevents poorly configured remote Matrix servers from
    # either thrashing your cache or poisoning it with stale IPs for too long.
    cache-min-ttl: 300
    cache-max-ttl: 86400

    # --- Security & Validation ---
    # DNSSEC is critical for Matrix to prevent MITM attacks on federation traffic.
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-algo-downgrade: yes

    # Matrix touches many obscure authoritative servers.
    # Disabling caps-for-id prevents resolution failures with non-compliant remote servers.
    use-caps-for-id: no

    # Standard privacy
    qname-minimisation: yes

    # --- Interfaces & Access ---
    # Bind to localhost or your container bridge network
    interface: 127.0.0.1
    # interface: ::1

    access-control: 127.0.0.0/8 allow

    # If isolating Unbound alongside your homeserver in a Docker bridge network,
    # allow the appropriate subnet:
    # access-control: 172.16.0.0/12 allow
