server:
    # Listen only on localhost
    interface: 127.0.0.1
    port: 53
    access-control: 127.0.0.0/8 allow

    # Disable IPv6 if your server doesn't use it to reduce overhead. 
    # Change to 'yes' if your server has IPv6 connectivity.
    do-ip4: yes
    do-udp: yes
    do-tcp: yes
    do-ip6: no
    prefer-ip6: no

    # Disable DNSSEC entirely (Crucial for Matrix load and stability)
    module-config: "iterator"
    val-permissive-mode: yes
    ignore-cd-flag: yes

    # Performance & Caching Tuning
    # Set this to the number of physical CPU cores you have
    num-threads: 2

    # Keep cache slabs as a power of 2, ideally matching num-threads
    msg-cache-slabs: 2
    rrset-cache-slabs: 2
    infra-cache-slabs: 2
    key-cache-slabs: 2

    # Memory allocation (Increase if you have ample RAM)
    # rrset-cache-size should generally be 2x the msg-cache-size
    rrset-cache-size: 100m
    msg-cache-size: 50m

    # Fetch elements from the cache before they expire to keep them hot
    prefetch: yes
    
    # Serve expired responses from cache while updating in the background
    # Highly recommended for Matrix to prevent connection timeouts during resolution
    serve-expired: yes
    serve-expired-ttl: 86400

    # Increase connection limits for heavy federation traffic
    outgoing-range: 8192
    num-queries-per-thread: 4096

    # OS Socket Buffer tuning (Requires OS-level sysctl tweaks to fully utilize)
    so-rcvbuf: 4m
    so-sndbuf: 4m

    # Security / Privacy
    hide-identity: yes
    hide-version: yes
    use-caps-for-id: no

# DO NOT include a 'forward-zone' section. Unbound will query the root servers directly.
