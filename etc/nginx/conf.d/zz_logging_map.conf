# Admin Log Separation Logic
# Note: $is_admin_ip is defined in secrets.conf (git-crypt)

# Flag bad traffic globally
map "$bad_ip:$bad_bot:$bad_request" $is_bad {
    default 0;
    "~1" 1;
}

map "$is_admin_ip:$is_bad" $log_regular {
    "0:0" 1;
    default 0;
}

map "$is_admin_ip:$is_bad" $log_admin {
    "1:0" 1;
    default 0;
}

map "$is_bad" $log_bad {
    1 1;
    default 0;
}
