# SnappyMail Webmail Client
server {
    listen 80;
    listen [::]:80;
    server_name snappy.nutra.tk;
    return 301 https://$host$request_uri;
}

server {
    server_name snappy.nutra.tk;

    # Listening Ports
    listen 443 quic;
    listen [::]:443 quic;
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    http3 on;

    include snippets/block-bad-requests.conf;

    # SSL Configuration (Run certbot --nginx -d snappy.nutra.tk to provision)
    ssl_certificate /etc/letsencrypt/live/snappy.nutra.tk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/snappy.nutra.tk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    ssl_trusted_certificate /etc/ssl/private/ca-certs.pem;

    # Headers
    add_header X-Debug-Server "SnappyMail-Prod" always;
    add_header Alt-Svc 'h3=":443"; ma=86400' always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # include snippets/security-headers.conf; # Optional for SnappyMail

    root /var/www/snappymail;
    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP scripts to FastCGI server
    location ~ \.php$ {
        # Fallback to standard fastcgi_params if snippets/fastcgi-php.conf is missing
        include /etc/nginx/fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Check standard socket location (could be /run/php/php8.1-fpm.sock etc. based on installed version)
        # Attempt standard location first:
        fastcgi_pass unix:/run/php/php-fpm.sock;
        # Alternative: fastcgi_pass 127.0.0.1:9000;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # Deny access to sensitive SnappyMail data
    location ^~ /data {
        deny all;
    }
}
