# MTA-STS Policy Server
# DNS for mta-sts.nutra.tk points here.
# SSL cert shared with mail.nutra.tk.

server {
    listen 80;
    listen [::]:80;
    server_name mta-sts.nutra.tk;

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen 443 quic;
    listen [::]:443 quic;
    server_name mta-sts.nutra.tk;

    # Enable protocols
    http2 on;
    http3 on;

    # SSL Configuration (Shared with mail.nutra.tk)
    ssl_certificate /etc/letsencrypt/live/mail.nutra.tk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.nutra.tk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Headers
    add_header X-Debug-Server "MTA-STS-Prod" always;
    add_header Alt-Svc 'h3=":443"; ma=86400' always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Serve the MTA-STS policy file
    location = /.well-known/mta-sts.txt {
        root /var/www/mta-sts;
        default_type text/plain;
    }

    # Deny access to everything else
    location / {
        return 404;
    }
}
