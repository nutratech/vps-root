server {
    server_name git.nutra.tk;

    # Listening Ports
    listen 443 quic;

    # Admin Log Separation
    include snippets/custom-logging.conf;

    listen [::]:443 quic;
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    http3 on;

    # Block/drop bots
    if ($bad_bot) {
        return 444;
    }

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/dev.nutra.tk/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/dev.nutra.tk/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    ssl_trusted_certificate /etc/ssl/private/ca-certs.pem;

    # Headers
    add_header X-Debug-Server "Git" always;
    add_header Alt-Svc 'h3=":443"; ma=86400' always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ----------------------------------------------------------------------
    # All git traffic proxied to prod box (nutra.tk)
    # Gitea + gitweb migrated off dev due to Matrix memory pressure.
    # Dev box holds the git.nutra.tk SSL cert; DNS still points here.
    # ----------------------------------------------------------------------

    location / {
        proxy_pass https://nutra.tk;
        proxy_set_header Host git.nutra.tk;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # Recommended for Git Pushes
        client_max_body_size 512M;
    }
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name git.nutra.tk;

    return 301 https://$host$request_uri;
}
