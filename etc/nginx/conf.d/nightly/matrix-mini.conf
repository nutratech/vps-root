map $http_origin $matrix_cors_origin {
    default "$http_origin";
}

upstream conduwuit_mini {
    server unix:/var/lib/minic10y/conduwuit.sock;
    keepalive 32;
}

server {
    server_name minimat.nutra.tk;
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 443 quic reuseport;
    listen [::]:443 quic reuseport;
    http2 on;
    http3 on;
    add_header Alt-Svc 'h3=":443"; ma=86400' always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    include snippets/custom-logging.conf;

    # SSL / HTTPS
    ssl_certificate /etc/letsencrypt/live/nightly.nutra.tk/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/nightly.nutra.tk/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    ssl_trusted_certificate /etc/ssl/private/ca-certs.pem;

    add_header X-Debug-Server "Matrix";
    client_max_body_size 50m;
    client_body_buffer_size 128k;

    # .well-known Discovery (Self-Delegation)
    # This prevents tools like testmatrix from falling back to port 8448 when checking the subdomain directly.
    location = /.well-known/matrix/client {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization' always;
        add_header Alt-Svc 'h3=":443"; ma=86400' always;
        default_type application/json;
        return 200 '{"m.homeserver": {"base_url": "https://minimat.nutra.tk"}}';
    }

    location = /.well-known/matrix/server {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization' always;
        add_header Alt-Svc 'h3=":443"; ma=86400' always;
        default_type application/json;
        return 200 '{"m.server": "minimat.nutra.tk:443"}';
    }

    # Block favicon request in http3 quic 404
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        add_header Alt-Svc 'h3=":443"; ma=86400' always;
        return 204;
    }

    # Specific handling for Matrix Media to prevent ORB/CORS issues
    location ^~ /_matrix/media {
        # Strip upstream headers that might confuse the browser or trigger ORB
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Content-Security-Policy-Report-Only;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-XSS-Protection;
        proxy_hide_header X-Content-Type-Options;

        # Add explicit permissive CORS for media
        add_header Access-Control-Allow-Origin "$matrix_cors_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization, Range" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Content-Disposition" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Vary "Origin" always;

        # Pass to backend
        # proxy_pass http://127.0.0.1:8008;
        proxy_pass http://conduwuit_mini;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        chunked_transfer_encoding on;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase body size for media uploads just in case
        client_max_body_size 50m;
    }

    # Fix for Matrix CORS (Versions & Federation)
    location /_matrix {
        # Compress responses > 1KB
        gzip on;
        gzip_min_length 1024;
        gzip_types application/json text/css application/javascript;

        # Strip any upstream CORS headers from the backend to avoid invalid duplicate values (e.g., "*, *")
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        # Enforce standard Matrix CORS headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization" always;

        # Handle OPTIONS preflight requests
        if ($request_method = 'OPTIONS') {
            # Note: Nginx does not inherit add_header directives inside an `if` block, so they must be repeated
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization" always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        # Your existing Continuwuity proxy_pass configuration
        # proxy_pass http://127.0.0.1:8008;
        proxy_pass http://conduwuit_mini;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        chunked_transfer_encoding on;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for Matrix (especially for rooms and initial sync)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 600s;

        # Prevent buffering to disk
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 32 16k;
        proxy_busy_buffers_size 32k;
    }

    # Fix for Synapse Admin API (CORS)
    location /_synapse {
        # proxy_pass http://127.0.0.1:8008;
        proxy_pass http://conduwuit_mini;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        chunked_transfer_encoding on;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        # proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-For $remote_addr;
        client_max_body_size 50m;

        # Force CORS for this endpoint (Hide upstream to avoid dups, then add ours)
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        add_header X-Debug-Server "Matrix" always;
        add_header Alt-Svc 'h3=":443"; ma=86400' always;
        add_header 'Access-Control-Allow-Origin' "$matrix_cors_origin" always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' "$matrix_cors_origin";
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization';
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Max-Age' 86400;

            add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range';
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    location / {
        # Service: Matrix Chat | https://minimat.nutra.tk
        # proxy_pass http://127.0.0.1:8008;
        proxy_pass http://conduwuit_mini;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        chunked_transfer_encoding on;
        proxy_request_buffering off;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;

        # Hide upstream CORS headers to prevent duplication (Conduit sends *, we need specific for Creds)
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Expose-Headers;
        # Hide upstream CSP to prevent conflict with our global CSP ("none" error)
        proxy_hide_header Content-Security-Policy;

        # CORS Headers (Simplified with Map)
        add_header X-Debug-Server "Matrix" always;
        add_header Alt-Svc 'h3=":443"; ma=86400' always;
        add_header 'Access-Control-Allow-Origin' "$matrix_cors_origin" always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization, X-Idempotency-Key, Idempotency-Key, Cache-Control, X-File-Name' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' "$matrix_cors_origin";
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization, X-Idempotency-Key, Idempotency-Key, Cache-Control, X-File-Name';
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Max-Age' 86400;

            add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range';
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Timeouts for Matrix (especially for federation and initial sync)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 600s;
    }
}
